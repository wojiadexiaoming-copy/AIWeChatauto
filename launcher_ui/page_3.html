  // ── Toast 通知 ──
  function showToast(message, type = 'success') {
      let container = document.getElementById('launcher-toast-container');
      if (!container) {
          container = document.createElement('div');
          container.id = 'launcher-toast-container';
          container.className = 'fixed top-16 right-6 z-50 flex flex-col gap-2 pointer-events-none';
          document.body.appendChild(container);
      }
      const toast = document.createElement('div');
      toast.className = 'px-4 py-2.5 rounded-lg text-xs font-semibold shadow-xl transition-all duration-300 transform translate-x-12 opacity-0 pointer-events-auto flex items-center gap-2 max-w-xs ' + 
          (type === 'success' ? 'bg-emerald-600 text-white' : type === 'error' ? 'bg-rose-600 text-white' : 'bg-yellow-500 text-white');
                  
      const icon = document.createElement('i');
      icon.className = type === 'success' ? 'fa-solid fa-circle-check' : type === 'error' ? 'fa-solid fa-circle-xmark' : 'fa-solid fa-triangle-exclamation';
      
      toast.appendChild(icon);
      const span = document.createElement('span');
      span.textContent = message;
      toast.appendChild(span);
      
      container.appendChild(toast);
      
      requestAnimationFrame(() => {
          toast.classList.remove('translate-x-12', 'opacity-0');
      });
      
      setTimeout(() => {
          toast.classList.add('translate-x-12', 'opacity-0');
          setTimeout(() => toast.remove(), 300);
      }, 3000);
  }

      if (!window.pywebview || !window.pywebview.api) return;
      window.pywebview.api.get_config().then(config => {
          currentSkills = config.skills || [];
          renderGrid();
      }).catch(err => {
          showToast('加载配置失败: ' + err.message, 'error');
      });
  }

  function renderGrid() {
      const grid = document.getElementById('personas-grid');
      const emptyState = document.getElementById('empty-state');
      grid.innerHTML = '';
      
      if (currentSkills.length === 0) {
          emptyState.classList.remove('hidden');
          grid.classList.add('hidden');
          return;
      }
      
      emptyState.classList.add('hidden');
      grid.classList.remove('hidden');
 
      currentSkills.forEach(skill => {
          const card = document.createElement('div');
          card.className = 'bg-app-card border border-app-border/40 rounded-lg p-5 flex flex-col gap-4 shadow-sm hover:border-gray-500/30 transition-all';
          
          // Truncate previews
          const identityText = skill.identity || skill.system_prompt || '';
          const userText = skill.user || '';
          const workflowText = skill.workflow || '';
          
          const identityPreview = identityText.length > 35 ? identityText.substring(0, 35) + '...' : identityText || '未配置';
          const userPreview = userText.length > 35 ? userText.substring(0, 35) + '...' : userText || '未配置';
          const workflowPreview = workflowText.length > 35 ? workflowText.substring(0, 35) + '...' : workflowText || '未配置';

          card.innerHTML = `
              <div class="flex items-start justify-between gap-3">
                <div class="flex items-center gap-2.5">
                  <div class="w-8 h-8 rounded-lg bg-blue-500/10 flex items-center justify-center text-app-primary">
                    <i class="fa-solid fa-user-ninja"></i>
                  </div>
                  <div>
                    <h3 class="text-sm font-semibold text-app-text">${skill.name}</h3>
                    <p class="text-[10px] text-app-textMuted mt-0.5">ID: ${skill.id}</p>
                  </div>
                </div>
                <div class="flex items-center gap-1">
                  <button onclick="editPersona('${skill.id}')" class="p-1.5 text-app-textMuted hover:text-app-text hover:bg-white/5 rounded transition-colors" title="编辑人设">
                    <i class="fa-solid fa-pen-to-square text-xs"></i>
                  </button>
                  <button onclick="deletePersona('${skill.id}')" class="p-1.5 text-app-textMuted hover:text-rose-500 hover:bg-rose-500/10 rounded transition-colors" title="删除人设">
                    <i class="fa-solid fa-trash text-xs"></i>
                  </button>
                </div>
              </div>
              <div class="flex-1 flex flex-col gap-2">
                <p class="text-xs text-app-textMuted leading-relaxed mb-1">${skill.description}</p>
                <div class="bg-black/10 border border-app-border/20 rounded p-2.5 mt-auto space-y-1.5 text-[11px] leading-normal select-text">
                  <div>
                    <span class="text-[9px] text-blue-400 font-bold uppercase mr-1">性格 (IDENTITY):</span>
                    <span class="text-app-textMuted font-sans">${identityPreview}</span>
                  </div>
                  <div>
                    <span class="text-[9px] text-green-400 font-bold uppercase mr-1">受众 (USER):</span>
                    <span class="text-app-textMuted font-sans">${userPreview}</span>
                  </div>
                  <div>
                    <span class="text-[9px] text-yellow-500 font-bold uppercase mr-1">规范 (WORKFLOW):</span>
                    <span class="text-app-textMuted font-sans">${workflowPreview}</span>
                  </div>
                </div>
              </div>
          `;
          grid.appendChild(card);
      });
  }

  // ── 保存人设配置到后端 ──
  function saveSkillsToConfig() {
      if (!window.pywebview || !window.pywebview.api) return;
      window.pywebview.api.get_config().then(config => {
          config.skills = currentSkills;
          return window.pywebview.api.save_config(config);
      }).then(success => {
          if (success) {
              showToast('人设配置保存成功！', 'success');
              renderGrid();
          } else {
              showToast('保存到 config.json 失败', 'error');
          }
      }).catch(err => {
          showToast('人设操作异常: ' + err.message, 'error');
      });
  }

  // ── 增/改/删/恢复 操作逻辑 ──
  window.editPersona = function(id) {
      const skill = currentSkills.find(s => s.id === id);
      if (!skill) return;
      
      document.getElementById('edit-persona-id').value = skill.id;
      document.getElementById('modal-persona-name').value = skill.name;
      document.getElementById('modal-persona-desc').value = skill.description;
      document.getElementById('modal-persona-identity').value = skill.identity || skill.system_prompt || '';
      document.getElementById('modal-persona-user').value = skill.user || '';
      document.getElementById('modal-persona-workflow').value = skill.workflow || '';
      
      document.getElementById('modal-title').textContent = '编辑人设';
      openModal();
  };

  window.deletePersona = function(id) {
      if (confirm('确认要删除该写作人设吗？删除后在写作页将不可选。')) {
          currentSkills = currentSkills.filter(s => s.id !== id);
          saveSkillsToConfig();
      }
  };

  function openModal() {
      const modal = document.getElementById('persona-modal');
      modal.classList.remove('hidden');
      setTimeout(() => {
          const card = document.getElementById('persona-modal-card');
          if (card) card.classList.remove('scale-95');
      }, 50);
  }

  function closeModal() {
      const modal = document.getElementById('persona-modal');
      const card = document.getElementById('persona-modal-card');
      if (card) card.classList.add('scale-95');
      setTimeout(() => {
          modal.classList.add('hidden');
          // Clear inputs
          document.getElementById('edit-persona-id').value = '';
          document.getElementById('modal-persona-name').value = '';
          document.getElementById('modal-persona-desc').value = '';
          document.getElementById('modal-persona-identity').value = '';
          document.getElementById('modal-persona-user').value = '';
          document.getElementById('modal-persona-workflow').value = '';
      }, 150);
  }

  // ── 绑定按钮点击事件 ──
  window.initPage3 = function() {
      // 打开新建人设弹窗
      document.getElementById('add-persona-btn')?.addEventListener('click', () => {
          document.getElementById('edit-persona-id').value = '';
          document.getElementById('modal-title').textContent = '创建新人设';
          openModal();
      });

      // 关闭模态框
      document.getElementById('close-modal-btn')?.addEventListener('click', closeModal);
      document.getElementById('cancel-modal-btn')?.addEventListener('click', closeModal);

      // 保存人设
      document.getElementById('save-persona-btn')?.addEventListener('click', () => {
          const editId = document.getElementById('edit-persona-id').value;
          const name = document.getElementById('modal-persona-name').value.trim();
          const desc = document.getElementById('modal-persona-desc').value.trim();
          const identity = document.getElementById('modal-persona-identity').value.trim();
          const user = document.getElementById('modal-persona-user').value.trim();
          const workflow = document.getElementById('modal-persona-workflow').value.trim();

          if (!name || !desc || !identity || !user || !workflow) {
              showToast('请完整填写所有必填字段 (*)', 'warning');
              return;
          }

          if (editId) {
              // 编辑已有
              const idx = currentSkills.findIndex(s => s.id === editId);
              if (idx !== -1) {
                  currentSkills[idx] = { id: editId, name, description: desc, identity: identity, user: user, workflow: workflow };
              }
          } else {
              // 创建新的人设
              const newId = 'skill_' + Date.now();
              currentSkills.push({ id: newId, name, description: desc, identity: identity, user: user, workflow: workflow });
          }

          closeModal();
          saveSkillsToConfig();
      });

      // 恢复默认人设
      document.getElementById('restore-defaults-btn')?.addEventListener('click', () => {
          if (confirm('确认要恢复默认人设吗？您自定义修改的人设将会被重置为内置配置。')) {
              currentSkills = JSON.parse(JSON.stringify(DEFAULT_SKILLS));
              saveSkillsToConfig();
          }
      });

      // 获取当前列表
      loadPersonas();
  };

  // ── 统一启动 ──
  document.addEventListener('DOMContentLoaded', () => {
      if (window.pywebview && window.pywebview.api) {
          window.initPage3();
      } else {
          window.addEventListener('pywebviewready', window.initPage3);
      }
  });
</script>
</body>
</html>
