<main class="flex-1 overflow-y-auto p-6 scroll-smooth bg-app-dark text-white">
  <!-- Sticky Header Block -->
  <div id="sticky-header" class="sticky top-[-24px] bg-app-dark pt-6 pb-2 mb-6 z-20 border-b border-gray-800/30">
    <!-- Header banner style container -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 pb-4">
      <div>
        <h2 class="text-xl font-bold text-app-text">AI 工具导航</h2>
        <p class="text-xs text-app-textMuted mt-1">汇集精选优质 AI 工具，为您的内容创作保驾护航</p>
      </div>
      
      <!-- Search Bar -->
      <div class="relative w-full md:w-80">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-500">
          <i class="fa-solid fa-magnifying-glass"></i>
        </span>
        <input type="text" id="tool-search" class="w-full pl-9 pr-4 py-2 bg-[#1e1e24] border border-gray-700/50 rounded-md text-sm text-gray-300 focus:outline-none focus:border-app-primary focus:ring-1 focus:ring-app-primary placeholder-gray-500" placeholder="搜索工具名称或描述..." />
      </div>
    </div>

    <!-- Categories Navigation (Horizontal Pills scrollable) -->
    <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide select-none" id="categories-container">
      <!-- Categories will be rendered here dynamically -->
      <button class="category-pill px-4 py-1.5 rounded-full text-xs font-medium bg-app-primary text-white border border-transparent transition-all shrink-0 cursor-pointer" data-category="all">全部</button>
    </div>
  </div>

  <!-- Loading State -->
  <div id="loading-state" class="flex flex-col items-center justify-center py-20 text-app-textMuted">
    <i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-app-primary"></i>
    <span class="text-sm">正在加载 AI 工具列表...</span>
  </div>

  <!-- Empty State -->
  <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-app-textMuted">
    <i class="fa-solid fa-briefcase text-3xl mb-3"></i>
    <span class="text-sm">没有找到匹配的工具</span>
  </div>

  <!-- Tools Grid Wrapper -->
  <div id="tools-grid" class="hidden">
    <!-- Category sections will be rendered here dynamically -->
  </div>
</main>
<!-- END: MainContent -->
</div>

<script>
  window.initPage8 = function() {
      const searchInput = document.getElementById('tool-search');
      const categoriesContainer = document.getElementById('categories-container');
      const toolsGrid = document.getElementById('tools-grid');
      const loadingState = document.getElementById('loading-state');
      const emptyState = document.getElementById('empty-state');
      
      let allTools = [];
      let currentCategory = 'all';
      let searchQuery = '';

      async function loadTools() {
          const CACHE_KEY = 'ai-tools-cache-data';
          const CACHE_TIME_KEY = 'ai-tools-cache-time';
          const CACHE_EXPIRY = 7 * 24 * 60 * 60 * 1000; // 7 days in ms

          // 1. Check local cache
          const cachedData = localStorage.getItem(CACHE_KEY);
          const cachedTime = localStorage.getItem(CACHE_TIME_KEY);
          const now = Date.now();

          if (cachedData && cachedTime && (now - parseInt(cachedTime) < CACHE_EXPIRY)) {
              try {
                  const tools = JSON.parse(cachedData);
                  if (tools && tools.length > 0) {
                      return tools;
                  }
              } catch (e) {
                  console.error("Failed to parse cached tools:", e);
              }
          }

          // 2. Cache expired or missing, try fetching from uniCloud
          try {
              const response = await fetch('https://env-00jxtxx9y58k.dev-hz.cloudbasefunction.cn/GPT_inodetree-ai_tools', {
                  method: 'POST',
                  headers: {
                      'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({})
              });
              if (response.ok) {
                  const outer = await response.json();
                  // Unwrap DCloud body trigger response
                  const json = typeof outer.body === 'string' ? JSON.parse(outer.body) : (outer.body || outer);
                  if (json && json.success && json.data && json.data.length > 0) {
                      localStorage.setItem(CACHE_KEY, JSON.stringify(json.data));
                      localStorage.setItem(CACHE_TIME_KEY, now.toString());
                      return json.data;
                  }
              }
              console.warn("uniCloud response not ok or success=false, status:", response.status);
          } catch (e) {
              console.error("Failed to fetch tools from uniCloud:", e);
          }

          // 3. uniCloud failed, try fetching from local fallback ../static/tools.json
          try {
              const response = await fetch('../static/tools.json');
              if (response.ok) {
                  const tools = await response.json();
                  if (tools && tools.length > 0) {
                      localStorage.setItem(CACHE_KEY, JSON.stringify(tools));
                      localStorage.setItem(CACHE_TIME_KEY, now.toString());
                      return tools;
                  }
              }
          } catch (e) {
              console.error("Failed to fetch local fallback tools:", e);
          }

          // 4. Last resort: return old cache if we have one
          if (cachedData) {
              try {
                  return JSON.parse(cachedData);
              } catch(e) {}
          }
          return [];
      }

      const mainEl = document.querySelector('main');
      let isProgramScrolling = false;

      loadTools().then(tools => {
          allTools = tools;
          if (loadingState) loadingState.classList.add('hidden');
          
          if (!allTools || allTools.length === 0) {
              if (emptyState) emptyState.classList.remove('hidden');
              return;
          }
          
          // Extract unique categories and sort them
          const categories = ['all', ...new Set(allTools.map(t => t.category).filter(Boolean))];
          
          // Render category buttons
          renderCategories(categories);
          
          // Render tools
          renderTools();
          
          // Bind search event
          if (searchInput) {
              searchInput.addEventListener('input', (e) => {
                  searchQuery = e.target.value.toLowerCase().trim();
                  renderTools();
              });
          }

          // Bind scroll-spy event to main element
          if (mainEl) {
              mainEl.addEventListener('scroll', () => {
                  if (isProgramScrolling) return;
                  
                  const sections = toolsGrid.querySelectorAll('.category-section');
                  if (sections.length === 0) return;
                  
                  const mainRect = mainEl.getBoundingClientRect();
                  const stickyHeader = document.getElementById('sticky-header');
                  const stickyHeight = stickyHeader ? (stickyHeader.offsetHeight - 24) : 120;
                  let activeCat = 'all';
                  
                  if (mainEl.scrollTop < 50) {
                      activeCat = 'all';
                  } else {
                      sections.forEach(sec => {
                          const secRect = sec.getBoundingClientRect();
                          // If section top has passed the bottom of the stuck header (plus small offset)
                          if (secRect.top - mainRect.top <= stickyHeight + 20) {
                              activeCat = sec.getAttribute('data-category');
                          }
                      });
                  }
                  
                  if (activeCat !== currentCategory) {
                      currentCategory = activeCat;
                      updateActivePill();
                  }
              });
          }
      });

      function renderCategories(categories) {
          if (!categoriesContainer) return;
          const catMap = {
              'all': '全部'
          };
          
          categoriesContainer.innerHTML = categories.map(cat => {
              const displayName = catMap[cat] || cat;
              const isActive = cat === currentCategory;
              const activeClasses = 'bg-app-primary text-white border-transparent';
              const inactiveClasses = 'bg-app-card text-app-textMuted hover:text-app-text border-app-border border hover:bg-card-hover';
              
              return `<button class="category-pill px-4 py-1.5 rounded-full text-xs font-medium transition-all shrink-0 cursor-pointer ${isActive ? activeClasses : inactiveClasses}" data-category="${cat}">${displayName}</button>`;
          }).join('');

          // Bind click listeners
          categoriesContainer.querySelectorAll('.category-pill').forEach(btn => {
              btn.addEventListener('click', () => {
                  const cat = btn.getAttribute('data-category');
                  currentCategory = cat;
                  updateActivePill();
                  
                  // Scroll to target section
                  if (mainEl) {
                      isProgramScrolling = true;
                      if (cat === 'all') {
                          mainEl.scrollTo({ top: 0, behavior: 'smooth' });
                          setTimeout(() => { isProgramScrolling = false; }, 800);
                      } else {
                          const sec = document.getElementById(`sec-${cat}`);
                          if (sec) {
                              const stickyHeader = document.getElementById('sticky-header');
                              const stickyHeight = stickyHeader ? (stickyHeader.offsetHeight - 24) : 120;
                              const relativeTop = sec.getBoundingClientRect().top - mainEl.getBoundingClientRect().top;
                              const targetScrollTop = mainEl.scrollTop + relativeTop - stickyHeight - 10;
                              mainEl.scrollTo({
                                  top: targetScrollTop,
                                  behavior: 'smooth'
                              });
                          }
                          setTimeout(() => { isProgramScrolling = false; }, 800);
                      }
                  }
              });
          });
      }

      function updateActivePill() {
          if (!categoriesContainer) return;
          categoriesContainer.querySelectorAll('.category-pill').forEach(b => {
              const cat = b.getAttribute('data-category');
              const isActive = cat === currentCategory;
              if (isActive) {
                  b.className = 'category-pill px-4 py-1.5 rounded-full text-xs font-medium transition-all shrink-0 cursor-pointer bg-app-primary text-white border-transparent';
                  // Auto scroll tab bar to keep active tab visible
                  b.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
              } else {
                  b.className = 'category-pill px-4 py-1.5 rounded-full text-xs font-medium transition-all shrink-0 cursor-pointer bg-app-card text-app-textMuted hover:text-app-text border-app-border border hover:bg-card-hover';
              }
          });
      }

      function renderTools() {
          if (!toolsGrid) return;
          
          // Filter tools based on search query
          const searched = allTools.filter(tool => {
              return !searchQuery || 
                     (tool.name && tool.name.toLowerCase().includes(searchQuery)) ||
                     (tool.description && tool.description.toLowerCase().includes(searchQuery));
          });
          
          if (searched.length === 0) {
              toolsGrid.classList.add('hidden');
              if (emptyState) emptyState.classList.remove('hidden');
              return;
          }
          
          if (emptyState) emptyState.classList.add('hidden');
          toolsGrid.classList.remove('hidden');
          
          // Group by category
          const groups = {};
          searched.forEach(tool => {
              const cat = tool.category || '其他';
              if (!groups[cat]) groups[cat] = [];
              groups[cat].push(tool);
          });
          
          // Generate sections
          let html = '';
          for (const [catName, catTools] of Object.entries(groups)) {
              html += `
              <div class="category-section mb-10 scroll-mt-24" data-category="${catName}" id="sec-${catName}">
                  <h3 class="text-[13px] font-bold text-gray-400/80 mb-4 px-1 flex items-center gap-2 select-none">
                      <span class="w-1 h-3.5 bg-app-primary rounded-full"></span>
                      ${catName} <span class="text-[10px] text-gray-600 font-normal">(${catTools.length})</span>
                  </h3>
                  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                      ${catTools.map(tool => {
                          const iconSrc = tool.icon_raw || (tool.icon && tool.icon.startsWith('http') ? tool.icon : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7');
                          return `
                          <a class="card-link flex items-start p-4 rounded-lg group cursor-pointer border border-app-border hover:border-gray-500/30 transition-all shadow-sm" href="${tool.link}" target="_blank">
                              <div class="w-10 h-10 rounded bg-[#1e1e24] border border-gray-700/50 flex items-center justify-center mr-3 overflow-hidden flex-shrink-0">
                                  <img src="${iconSrc}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                                  <div style="display:none" class="w-full h-full items-center justify-center text-gray-400 group-hover:text-white transition-colors">
                                      <i class="fa-solid fa-link text-sm"></i>
                                  </div>
                              </div>
                              <div class="flex-1 min-w-0">
                                  <div class="text-[14px] font-semibold text-app-text mb-1 truncate group-hover:text-app-primary transition-colors">${tool.name}</div>
                                  <div class="text-[11px] text-app-textMuted line-clamp-2 leading-relaxed" title="${tool.description || ''}">${tool.description || '暂无描述'}</div>
                              </div>
                          </a>
                          `;
                      }).join('')}
                  </div>
              </div>
              `;
          }
          
          toolsGrid.innerHTML = html;
      }
  };
</script>
