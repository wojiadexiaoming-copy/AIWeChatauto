  <script>
  // ── Tab 切换 ──
  (function() {
    const tabs    = document.querySelectorAll('.tab-item');
    const panels  = document.querySelectorAll('.tab-content');

    function switchTab(name) {
      tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      panels.forEach(p => p.classList.toggle('hidden', p.id !== 'tab-' + name));
      sessionStorage.setItem('activeTab', name);
    }

    tabs.forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

    // 恢复上次 tab
    const saved = sessionStorage.getItem('activeTab') || 'create';
    switchTab(saved);
  })();

  // ── 时钟 ──
  (function() {
    const el = document.getElementById('current-time');
    function tick() {
      el.textContent = new Date().toLocaleTimeString('zh-CN', {hour12: false});
    }
    tick();
    setInterval(tick, 1000);
  })();

  // 获取 GitHub Star 数
  (function() {
    const starEl = document.getElementById('star-num');
    if (!starEl) return;
    
    // 优先从本地后端接口获取（后端内置了缓存及多备用渠道解析）
    fetch('/api/github-stars')
      .then(res => {
        if (res.ok) return res.json();
        throw new Error('Local API error');
      })
      .then(d => {
        if (d && d.success && d.stars && d.stars !== '--') {
          starEl.textContent = d.stars;
        } else {
          fallbackFetch();
        }
      })
      .catch(err => {
        console.warn('Failed to fetch stars from backend, trying direct fetch:', err);
        fallbackFetch();
      });

    function fallbackFetch() {
      const cacheKey = 'github_stars_count';
      const cacheTimeKey = 'github_stars_time';
      const cachedStars = localStorage.getItem(cacheKey);
      const cachedTime = localStorage.getItem(cacheTimeKey);
      const now = Date.now();
      
      if (cachedStars && cachedTime && (now - parseInt(cachedTime) < 3600000)) {
        starEl.textContent = cachedStars;
        return;
      }
      
      const repo = 'wojiadexiaoming-copy/AIWeChatauto';
      const sources = [
        `https://api.github.com/repos/${repo}`,
        `https://img.shields.io/github/stars/${repo}.json`
      ];
      
      function tryFetch(index) {
        if (index >= sources.length) {
          if (!starEl.textContent || starEl.textContent === '--') {
            starEl.textContent = '--';
          }
          return;
        }
        const url = sources[index];
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 4000);
        
        fetch(url, { signal: controller.signal })
          .then(res => {
            clearTimeout(timeoutId);
            if (res.ok) {
              return res.json();
            }
            throw new Error('Response not ok');
          })
          .then(d => {
            let count = null;
            if (d && typeof d.stargazers_count === 'number') {
              count = d.stargazers_count;
            } else if (d && d.message && url.includes('shields.io')) {
              if (d.message !== 'invalid' && d.message !== 'repo not found') {
                count = d.message;
              }
            }
            
            if (count !== null) {
              starEl.textContent = count;
              localStorage.setItem(cacheKey, count);
              localStorage.setItem(cacheTimeKey, now.toString());
            } else {
              tryFetch(index + 1);
            }
          })
          .catch(err => {
            clearTimeout(timeoutId);
            console.warn(`Failed to fetch stars from ${url}:`, err);
            tryFetch(index + 1);
          });
      }
      
      tryFetch(0);
    }
  })();

  // ── 检查更新 ──
  (function() {
    const btn = document.getElementById('check-update-btn');
    const REPO = 'wojiadexiaoming-copy/AIWeChatauto';
    const key  = 'last_update_check';
    const today = new Date().toISOString().slice(0,10);
    const last  = JSON.parse(localStorage.getItem(key) || '{}');

    function showTip(hasUpdate) {
      if (hasUpdate) {
        btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;">new_releases</span><span class="hidden sm:inline text-tertiary font-semibold">有新版本</span>';
      }
    }

    if (last.date === today && typeof last.hasUpdate !== 'undefined') {
      showTip(last.hasUpdate); return;
    }

    Promise.all([
      fetch(`https://api.github.com/repos/${REPO}/tags`).then(r=>r.json()),
      fetch('/api/local_version').then(r=>r.json())
    ]).then(([tags, local]) => {
      const latestTag = Array.isArray(tags) && tags.length ? tags[0].name : '';
      const localTag  = local && local.tag ? local.tag : '';
      const hasUpdate = !!(latestTag && localTag && latestTag !== localTag);
      localStorage.setItem(key, JSON.stringify({date: today, hasUpdate}));
      showTip(hasUpdate);
    }).catch(() => {});

    btn.addEventListener('click', function() {
      this.disabled = true;
      this.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size:14px;">sync</span>';
      Promise.all([
        fetch(`https://api.github.com/repos/${REPO}/tags`).then(r=>r.json()),
        fetch('/api/local_version').then(r=>r.json())
      ]).then(([tags, local]) => {
        const latestTag = Array.isArray(tags) && tags.length ? tags[0].name : '';
        const localTag  = local && local.tag ? local.tag : '';
        if (latestTag && localTag) {
          if (latestTag === localTag) {
            alert('已是最新版本 ' + localTag);
          } else if (confirm(`发现新版本 ${latestTag}（当前 ${localTag}），是否立即更新？`)) {
            fetch('/api/update_from_github', {method:'POST'})
              .then(r=>r.json()).then(r => {
                if (r.success) { alert('更新成功，即将刷新页面'); location.reload(); }
                else alert('更新失败：' + (r.message || '未知错误'));
              }).catch(() => alert('更新失败'));
          }
        } else {
          alert('无法获取版本信息');
        }
      }).catch(() => alert('获取版本信息失败'))
        .finally(() => {
          this.disabled = false;
          this.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;">sync</span><span class="hidden sm:inline">检查更新</span>';
        });
    });
  })();
  </script>
