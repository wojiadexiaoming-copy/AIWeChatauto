        <button class="flex flex-col items-center justify-center w-full py-2 text-app-textMuted hover:text-app-text hover:bg-white/5 transition-colors group cursor-pointer">
          <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>

        </button>
        <button class="flex flex-col items-center justify-center w-full py-2 text-app-textMuted hover:text-app-text hover:bg-white/5 transition-colors group cursor-pointer">
          <svg class="w-6 h-6 mb-1 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>

        <button class="flex flex-col items-center justify-center w-full py-2 text-app-textMuted hover:text-app-text hover:bg-white/5 transition-colors group cursor-pointer">
          <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>

    <!-- BEGIN: Main Content Container -->
    <main class="flex-1 flex flex-col min-w-0 bg-app-main relative z-10" data-purpose="main-content">
      <!-- Sub Navigation Bar -->
      <div class="flex items-center justify-between px-6 bg-app-main border-b border-app-border shrink-0" data-purpose="sub-navigation">
        <div class="flex space-x-6 h-12">
          <a class="flex items-center text-app-text font-medium relative h-full" href="#">
            <svg class="w-4 h-4 mr-2 text-app-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>

            <div class="absolute bottom-0 left-0 right-0 h-0.5 bg-app-primary"></div>
          </a>
        </div>
        <div class="flex space-x-4">
          <button id="refresh-list-btn" class="flex items-center text-app-textMuted hover:text-white transition-colors text-xs gap-1.5">
            <i class="fa-solid fa-arrows-rotate"></i> 刷新列表
          </button>
          <button id="update-latest-btn" class="flex items-center text-app-textMuted hover:text-white transition-colors text-xs gap-1.5">
            <i class="fa-solid fa-download"></i> 一键更新
          </button>
        </div>
      </div>
      
      <div class="flex-1 flex flex-col p-6 min-h-0 bg-app-main">
        <!-- Repository Info Panel -->
        <div class="bg-app-panel rounded-lg p-5 mb-6 text-[13px] text-gray-300 shadow-sm border border-app-border shrink-0 leading-relaxed font-mono" data-purpose="repository-info">
          <div class="flex mb-1">
            <span class="w-24 text-gray-400">远端仓库地址:</span>
            <span id="git-remote-url">获取中...</span>
          </div>
          <div class="flex mb-1">
            <span class="w-24 text-gray-400">当前运行分支:</span>
            <span id="git-branch">获取中...</span>
          </div>
          <div class="flex">
            <span class="w-24 text-gray-400">当前检出版本:</span>
            <span id="git-current-version">获取中...</span>
          </div>
        </div>

        <!-- Inner Tabs -->
        <div class="flex shrink-0 z-10" data-purpose="version-tabs">
          <button class="px-6 py-2.5 bg-[#25252d] text-white border-t border-l border-r border-[#3a3a46] rounded-t-md text-[13px] font-medium relative -mb-px">
            已发布版本 (Tags)
          </button>
        </div>

        <!-- Version Table List -->
        <div class="flex-1 overflow-auto bg-[#25252d] border border-[#3a3a46] rounded-tr-md rounded-b-md relative shadow-sm" data-purpose="version-list-table">
          <table class="w-full text-left border-collapse whitespace-nowrap">
            <thead class="sticky top-0 bg-[#2b2b36] shadow-[0_1px_0_#3a3a46] z-10">
              <tr>
                <th class="px-5 py-3 font-medium text-app-textMuted text-[13px] w-24">版本 ID</th>
                <th class="px-5 py-3 font-medium text-app-textMuted text-[13px]">更新说明</th>
                <th class="px-5 py-3 font-medium text-app-textMuted text-[13px] w-48 text-right pr-12">发布日期</th>
                <th class="px-5 py-3 font-medium text-app-textMuted text-[13px] w-28 text-center">操作</th>
              </tr>
            </thead>
            <tbody id="version-list-tbody" class="text-[13px] text-gray-300">
              <tr>
                <td colspan="4" class="py-6 text-center text-app-textMuted">
                  <i class="fa-solid fa-spinner fa-spin mr-2"></i> 正在读取版本列表...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
    <!-- END: Main Content Container -->
  </div>

  <script>
    window.initPage6 = function() {
        console.log("Initializing page_6.html version manager...");
        
        const refreshBtn = document.getElementById('refresh-list-btn');
        const updateBtn = document.getElementById('update-latest-btn');
        
        if (refreshBtn) {
            refreshBtn.addEventListener('click', loadVersionData);
        }
        if (updateBtn) {
            updateBtn.addEventListener('click', triggerUpdate);
        }
        
        loadVersionData();
    };

    function loadVersionData() {
        if (!window.pywebview || !window.pywebview.api) return;
        
        const remoteSpan = document.getElementById('git-remote-url');
        const branchSpan = document.getElementById('git-branch');
        const verSpan = document.getElementById('git-current-version');
        const tbody = document.getElementById('version-list-tbody');
        
        if (remoteSpan) remoteSpan.textContent = "正在读取...";
        if (branchSpan) branchSpan.textContent = "正在读取...";
        if (verSpan) verSpan.textContent = "正在读取...";
        if (tbody) {
            tbody.innerHTML = `
                <tr>
                  <td colspan="4" class="py-6 text-center text-app-textMuted">
                    <i class="fa-solid fa-spinner fa-spin mr-2"></i> 正在拉取版本记录...
                  </td>
                </tr>
            `;
        }
        
        // Load repo info
        window.pywebview.api.get_git_version_info().then(info => {
            if (remoteSpan) remoteSpan.textContent = info.remote_url;
            if (branchSpan) branchSpan.textContent = info.branch;
            if (verSpan) verSpan.textContent = info.current_version;
        });
        
        // Load versions list
        window.pywebview.api.get_git_version_list().then(list => {
            if (!tbody) return;
            tbody.innerHTML = '';
            
            if (!list || list.length === 0) {
                tbody.innerHTML = `
                    <tr>
                      <td colspan="4" class="py-6 text-center text-app-textMuted">无版本历史记录</td>
                    </tr>
                `;
                return;
            }
            
            list.forEach(item => {
                const activeBadge = item.current 
                    ? `<span class="inline-flex items-center px-2 py-0.5 rounded text-[11px] font-medium bg-green-500/10 text-green-500 border border-green-500/20"><i class="fa-solid fa-circle-check mr-1"></i> 当前</span>` 
                    : `<button onclick="switchVersion('${item.id}')" class="px-3 py-1 bg-[#33333d] hover:bg-[#444450] text-gray-300 border border-gray-600 rounded text-xs transition-colors">切换</button>`;
                    
                const isChecked = item.current ? 'checked' : '';
                
                tbody.innerHTML += `
                    <tr class="table-row-hover border-dotted-b">
                      <td class="px-5 py-2.5 text-[#5ea3ff] font-mono">${item.id} <span class="text-xs text-gray-500">(${item.commit})</span></td>
                      <td class="px-5 py-2.5">${item.desc}</td>
                      <td class="px-5 py-2.5 text-right font-mono pr-12 text-gray-400">${item.date}</td>
                      <td class="px-5 py-2.5">
                        <div class="flex items-center justify-end space-x-3">
                          <input class="rounded bg-[#1e1e24] border-gray-600 w-3.5 h-3.5 text-blue-500 focus:ring-0 focus:ring-offset-0 cursor-not-allowed" disabled ${isChecked} type="checkbox"/>
                          ${activeBadge}
                        </div>
                      </td>
                    </tr>
                `;
            });
        });
    }

    function switchVersion(versionId) {
        if (!window.pywebview || !window.pywebview.api) return;
        if (confirm(`确定要将项目切换/回退到版本 [${versionId}] 吗？`)) {
            window.pywebview.api.switch_git_version(versionId).then(res => {
                alert(res.msg);
                loadVersionData();
            });
        }
    }

    function triggerUpdate() {
        if (!window.pywebview || !window.pywebview.api) return;
        const btn = document.getElementById('update-latest-btn');
        const originalText = btn.innerHTML;
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i> 正在更新...';
        
        window.pywebview.api.update_git_to_latest().then(res => {
            alert(res.msg);
            btn.disabled = false;
            btn.innerHTML = originalText;
            loadVersionData();
        });
    }
  </script>
</body>
</html>
