<!-- BEGIN: Main Panel -->
<main class="flex-1 flex flex-col items-center justify-center bg-app-main p-8 overflow-y-auto custom-scrollbar">
  <div class="max-w-xl w-full bg-app-card border border-app-border rounded-2xl p-8 shadow-2xl flex flex-col items-center text-center gap-6 relative overflow-hidden backdrop-blur-md">
    <!-- Gradient background effect -->
    <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-green-500/10 rounded-full blur-3xl"></div>
    
    <!-- WeChat Icon with pulsing border -->
    <div class="w-16 h-16 rounded-full bg-green-500/10 border border-green-500/20 flex items-center justify-center text-green-400 text-3xl animate-pulse">
      <i class="fa-brands fa-weixin"></i>
    </div>
    
    <div class="space-y-2">
      <h2 class="text-2xl font-bold tracking-tight text-app-text">微信公众平台登录</h2>
      <p class="text-sm text-app-textMuted leading-relaxed px-4">
        微信公众平台设有严格的防框架（Clickjacking）和内嵌 Webview 审查的安全风控。
        如果将登录页面直接嵌入在页面内（即 iframe 模式），微信后台检测到非顶级窗口会直接拦截扫码授权。
      </p>
    </div>

    <!-- Alert note -->
    <div class="w-full bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-4 text-left flex gap-3 text-xs text-yellow-500/90">
      <div class="text-base"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div>
        <span class="font-bold">安全风控说明</span>：如果您使用内嵌窗口遇到“二维码扫码不成功”或“不支持在此环境扫描”，请选择下方推荐的“外部浏览器中打开”方案。
      </div>
    </div>

    <!-- Buttons -->
    <div class="w-full flex flex-col sm:flex-row gap-3 pt-2">
      <button onclick="openInExternal()" class="flex-1 py-3 px-4 rounded-xl bg-app-card border border-app-border hover:bg-app-cardHover text-app-text font-medium text-sm transition-all duration-200 flex items-center justify-center gap-2 active:scale-[0.98]">
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
        在外部浏览器打开
      </button>
      <button onclick="openInInternal()" class="flex-1 py-3 px-4 rounded-xl bg-blue-btn hover:bg-blue-btn-hover text-white font-medium text-sm transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-blue-500/20 active:scale-[0.98]">
        <i class="fa-brands fa-chrome"></i>
        打开独立谷歌窗口 (支持辅助插件)
      </button>
    </div>
    
    <p class="text-[11px] text-app-textMuted">
      提示：API 自动上传草稿基于后台 AppID/Secret 通讯，并不需要此扫码。扫码登录仅用于您登录公众号平台进行核对或群发。
    </p>
  </div>
</main>
<!-- END: Main Panel -->

<script>
  window.initPage7 = function() {
      // Initialize if needed
  };

  function openInExternal() {
      if (window.pywebview && window.pywebview.api) {
          window.pywebview.api.open_external_browser("https://mp.weixin.qq.com/");
      }
  }

  function openInInternal() {
      if (window.pywebview && window.pywebview.api) {
          window.pywebview.api.open_wechat_window();
      }
  }

  document.addEventListener('DOMContentLoaded', () => {
      if (window.pywebview && window.pywebview.api) {
          window.initPage7();
      } else {
          window.addEventListener('pywebviewready', window.initPage7);
      }
  });
</script>
