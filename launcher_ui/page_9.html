    </button>

    <!-- Open WebUI -->

      打开网页端
    </button>
    <!-- Terminate Process -->
    <button id="terminate-btn" class="flex items-center gap-1.5 px-3 py-1.5 text-xs text-gray-500 hover:bg-[#ef4444] hover:text-white rounded disabled:opacity-40 disabled:hover:text-white transition-colors" disabled>

      终止进程
    </button>

</footer>

<script>
  window.initPage9 = function() {
    const startBtn = document.getElementById('start-btn');
    const terminateBtn = document.getElementById('terminate-btn');
    const openWebBtn = document.getElementById('open-web-btn');
    const statusText = document.getElementById('status-text');
    const container = document.getElementById('log-container');
    
    // Check status on load
    if (window.pywebview && window.pywebview.api) {
      checkStatus();
      loadActiveLogs();
    } else {
      window.addEventListener('pywebviewready', () => {
        checkStatus();
        loadActiveLogs();
      });
    }
    
    // Check status periodically
    if (window.page9Interval) {
        clearInterval(window.page9Interval);
    }
    window.page9Interval = setInterval(checkStatus, 2000);
    
    function checkStatus() {
      if (!document.getElementById('start-btn')) {
         clearInterval(window.page9Interval);
         window.page9Interval = null;
         return;
      }
      window.pywebview.api.is_server_running().then((isRunning) => {
        updateUI(isRunning);
      });
    }
    
    function loadActiveLogs() {
      window.pywebview.api.get_active_logs().then((logs) => {
        if (logs && container) {
          container.textContent = logs;
          container.scrollTop = container.scrollHeight;
        }
      });
    }
    
    function updateUI(isRunning) {
      if (isRunning) {
        statusText.innerText = '运行中';
        statusText.classList.remove('text-gray-200');
        statusText.classList.add('text-green-400');
        
        startBtn.disabled = true;
        startBtn.classList.add('opacity-40', 'cursor-not-allowed');
        
        terminateBtn.disabled = false;
        terminateBtn.classList.remove('text-gray-500');
        terminateBtn.classList.add('text-gray-200');
        
        openWebBtn.disabled = false;
      } else {
        statusText.innerText = '未运行';
        statusText.classList.remove('text-green-400');
        statusText.classList.add('text-gray-200');
        
        startBtn.disabled = false;
        startBtn.classList.remove('opacity-40', 'cursor-not-allowed');
        
        terminateBtn.disabled = true;
        terminateBtn.classList.remove('text-gray-200');
        terminateBtn.classList.add('text-gray-500');
        
        openWebBtn.disabled = true;
      }
    }
    
    // Start Flask
    startBtn.addEventListener('click', () => {
      statusText.innerText = '正在启动...';
      window.pywebview.api.start_server().then((success) => {
        checkStatus();
        if (success) {
          window.pywebview.api.open_browser();
        }
      });
    });
    
    // Stop Flask
    terminateBtn.addEventListener('click', () => {
      statusText.innerText = '正在停止...';
      window.pywebview.api.stop_server().then(() => {
        checkStatus();
      });
    });
    
    // Open Web
    openWebBtn.addEventListener('click', () => {
      window.pywebview.api.open_browser();
    });

    // Log operations listeners
    const selectAllBtn = document.getElementById('select-all-log-btn');
    const copyBtn = document.getElementById('copy-log-btn');
    const clearBtn = document.getElementById('clear-log-btn');
    
    if (selectAllBtn) {
      selectAllBtn.addEventListener('click', () => {
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(container);
        selection.removeAllRanges();
        selection.addRange(range);
      });
    }
    
    if (copyBtn) {
      copyBtn.addEventListener('click', () => {
        if (!container) return;
        const text = container.textContent;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(text).then(() => {
            alert('日志已复制到剪贴板');
          }).catch(err => {
            console.error('Failed to copy: ', err);
          });
        } else {
          const selection = window.getSelection();
          const range = document.createRange();
          range.selectNodeContents(container);
          selection.removeAllRanges();
          selection.addRange(range);
          document.execCommand('copy');
          selection.removeAllRanges();
          alert('日志已复制到剪贴板');
        }
      });
    }
    
    if (clearBtn) {
      clearBtn.addEventListener('click', () => {
        if (container) {
          container.textContent = '';
        }
        if (window.pywebview && window.pywebview.api && window.pywebview.api.clear_logs) {
          window.pywebview.api.clear_logs();
        }
      });
    }
  };
  
  // Exposed function for python log streaming
  window.addLogLine = function(line) {
    const container = document.getElementById('log-container');
    if (container) {
      const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
      container.textContent += line + '\n';
      if (isAtBottom) {
        container.scrollTop = container.scrollHeight;
      }
    }
  };
</script>
